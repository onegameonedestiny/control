<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>動態場控儀表板</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent: #bb86fc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 80px; /* 留給底部狀態列的空間 */
            min-height: 100vh;
        }

        /* --- 頂部固定控制列 --- */
        header {
            position: sticky;
            top: 0;
            width: 100%;
            background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            padding: 10px 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            gap: 10px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        h1 {
            color: var(--accent);
            margin: 0;
            font-size: 1.1rem;
            white-space: nowrap;
        }

        .notify-btn {
            background: transparent;
            border: 1px solid #444;
            color: var(--text-main);
            font-size: 1.1rem;
            padding: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .notify-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            text-shadow: 0 0 8px rgba(187, 134, 252, 0.5);
        }

        .controls {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-grow: 1;
            justify-content: flex-end;
        }

        select {
            background-color: #2c2c2c;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.95rem;
            max-width: 150px;
            outline: none;
        }

        #btnNow {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(187, 134, 252, 0.5);
            flex-shrink: 0;
        }

        /* --- 儀表板主要內容 --- */
        .dashboard {
            width: 100%;
            max-width: 600px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
        }

        .event-card {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            border-left: 6px solid #444;
            transition: all 0.3s ease;
        }

        /* 過去的事件 (變暗) */
        .event-card.past-normal {
            opacity: 0.4;
            filter: grayscale(80%);
        }

        /* 剛發生，待確認 (醒目橘黃) */
        .event-card.past-immediate {
            border-left-color: #ffb74d;
            box-shadow: 0 2px 12px rgba(255, 183, 77, 0.15);
            transform: scale(1.01);
            opacity: 1;
        }
        .past-immediate .time-col { color: #ffb74d; }
        .past-immediate .status-badge { 
            background-color: rgba(255, 183, 77, 0.2); 
            color: #ffb74d; 
            border: 1px solid rgba(255, 183, 77, 0.5);
        }

        /* 即將到來 (醒目綠) */
        .event-card.future-immediate {
            border: 1px solid rgba(3, 218, 198, 0.5);
            border-left: 8px solid #03dac6;
            box-shadow: 0 0 15px rgba(3, 218, 198, 0.2);
            transform: scale(1.02);
            opacity: 1;
        }
        .future-immediate .time-col { color: #03dac6; }
        .future-immediate .status-badge { 
            background-color: rgba(3, 218, 198, 0.2); 
            color: #03dac6; 
        }

        /* 稍後的未來事件 (正常顯示) */
        .event-card.future-normal {
            border-left-color: #555;
            opacity: 0.8;
        }
        .future-normal .status-badge {
            background-color: #333;
            color: #888;
        }

        .time-col {
            font-size: 1.6rem;
            font-weight: bold;
            width: 85px;
            flex-shrink: 0;
            text-align: left;
            color: #aaa; /* 預設顏色 */
        }

        .desc-col {
            flex-grow: 1;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            display: inline-block;
            font-weight: bold;
        }

        /* --- 職位標籤顏色 --- */
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: bold;
            margin: 2px 2px;
            color: #000;
        }
        .badge-rover { background-color: #cf6679; color: white; }
        .badge-front { background-color: #82b1ff; }
        .badge-control { background-color: #ffb74d; }
        .badge-station { background-color: #69f0ae; }
        .badge-actor { background-color: #e1bee7; }

        /* --- 底部狀態列 --- */
        .bottom-status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid #333;
            padding: 10px 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 100;
            font-size: 0.9rem;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
        }

        .status-row { display: flex; align-items: flex-start; }
        .status-label {
            font-weight: bold;
            color: var(--text-muted);
            width: 65px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }
        .status-content {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .status-item {
            background: #333;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #ddd;
        }
        .status-item.highlight {
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        /* --- 自訂彈跳視窗 (Modal) --- */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 200; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.7); 
            backdrop-filter: blur(5px);
            justify-content: center; 
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 350px;
            border: 1px solid #444;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-title {
            color: var(--accent);
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.3rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .rest-block {
            background: #2c2c2c;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .rest-label { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 5px; }
        .rest-time { font-size: 1.4rem; font-weight: bold; color: white; }

        /* --- 網頁內建通知 (Toast) --- */
        #toastContainer {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 400px;
            pointer-events: none;
        }
        .toast {
            background: rgba(3, 218, 198, 0.95);
            color: #000;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            font-weight: bold;
            transform: translateY(-20px);
            opacity: 0;
            transition: all 0.3s ease;
            border-left: 6px solid #fff;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

    </style>
</head>
<body>
    
    <!-- 網頁內建通知容器 -->
    <div id="toastContainer"></div>

    <header>
        <div class="header-title">
            <h1>場控時刻</h1>
            <button id="btnNotify" class="notify-btn" title="開啟推播通知">🔕</button>
        </div>
        <div class="controls">
            <select id="roleSearch">
                <option value="" disabled selected>查休息時間</option>
                <option value="票亭">票亭</option>
                <option value="驗票">驗票</option>
                <option value="入口">入口</option>
                <option value="安一場控">安一場控</option>
                <option value="安二場控">安二場控</option>
                <option value="瑪莎多拉(1)">瑪莎多拉(1)</option>
                <option value="瑪莎多拉(2)">瑪莎多拉(2)</option>
                <option value="一坪海岸線(1)">一坪海岸線(1)</option>
                <option value="一坪海岸線(2)">一坪海岸線(2)</option>
                <option value="統治者的祝福(1)">統治者的祝福(1)</option>
                <option value="統治者的祝福(2)">統治者的祝福(2) (機動)</option>
            </select>
            <button id="btnNow">現</button>
        </div>
    </header>

    <div class="dashboard" id="eventContainer">
        <!-- 內容由 JavaScript 動態生成所有事件 -->
    </div>

    <div class="bottom-status-bar" id="bottomStatusBar">
        <div class="status-row">
            <div class="status-label">🛌 休息</div>
            <div class="status-content" id="restingList">
                <span class="status-item">系統初始化中...</span>
            </div>
        </div>
        <div class="status-row">
            <div class="status-label">🏃 機動</div>
            <div class="status-content" id="roverStatus">
                <span class="status-item">系統初始化中...</span>
            </div>
        </div>
    </div>

    <!-- 自訂彈跳視窗 -->
    <div id="restModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2 class="modal-title" id="modalRoleName">崗位名稱</h2>
            <div id="modalBody">
                <!-- 內容動態插入 -->
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCEzSFH4YvcE0I5WUlkSr7Hfn5-tVre5p5-GKWlblVYIIQkpHSFX6vc0Lc_jisVfGfnInry6-l789V/pub?output=csv';
        let roleStaffMap = {};

        const eventsData = [
            { time: '10:30', text: '票亭、驗票、入口：上班' },
            { time: '11:00', text: '安一場控、安二場控、瑪莎多拉(1)、瑪莎多拉(2)：上班' },
            { time: '11:20', text: '確認 A組演員 就位' },
            { time: '11:30', text: '一坪海岸線(1)、一坪海岸線(2)、統治者的祝福(1)、統治者的祝福(2)：上班<br>票亭、驗票：開始自休' },
            { time: '11:34', text: '入口：開始自休' },
            { time: '11:50', text: '確認 戀愛都市杜里亞斯 就位' },
            { time: '12:00', text: '票亭、驗票：自休結束返回<br>安一場控、瑪莎多拉(1)：開始自休<br>機動人員：前往接替驗票輪休' },
            { time: '12:04', text: '入口：自休結束返回' },
            { time: '12:20', text: '確認 B組演員 就位' },
            { time: '12:28', text: '安二場控、瑪莎多拉(2)：開始自休' },
            { time: '12:30', text: '安一場控、瑪莎多拉(1)：自休結束返回<br>驗票：輪休結束返回<br>機動人員：前往接替安一場控輪休' },
            { time: '12:55', text: '一坪海岸線(1)、一坪海岸線(2)：開始自休' },
            { time: '12:58', text: '安二場控、瑪莎多拉(2)：自休結束返回' },
            { time: '13:00', text: '安一場控：輪休結束返回<br>機動人員：前往接替瑪莎多拉(1)輪休' },
            { time: '13:05', text: '統治者的祝福(1)：開始自休' },
            { time: '13:25', text: '一坪海岸線(1)、一坪海岸線(2)：自休結束返回' },
            { time: '13:30', text: '瑪莎多拉(1)：輪休結束返回' },
            { time: '13:35', text: '統治者的祝福(1)：自休結束返回<br>機動人員：前往接替統治者的祝福(1)輪休' },
            { time: '14:05', text: '統治者的祝福(1)：輪休結束返回<br>統治者的祝福(2)：進入大休' },
            { time: '15:05', text: '統治者的祝福(2)：大休結束<br>機動人員：前往接替入口輪休' },
            { time: '15:35', text: '入口：輪休結束返回<br>機動人員：前往接替票亭輪休' },
            { time: '16:05', text: '票亭：輪休結束返回<br>機動人員：前往接替安二場控輪休' },
            { time: '16:35', text: '安二場控：輪休結束返回<br>機動人員：前往接替瑪莎多拉(2)輪休' },
            { time: '17:05', text: '瑪莎多拉(2)：輪休結束返回<br>機動人員：前往接替一坪海岸線(1)輪休' },
            { time: '17:35', text: '一坪海岸線(1)：輪休結束返回<br>機動人員：前往接替一坪海岸線(2)輪休' },
            { time: '18:05', text: '一坪海岸線(2)：輪休結束返回' },
            { time: '18:30', text: '票亭、驗票、入口：下班' },
            { time: '19:00', text: '安一場控、安二場控、瑪莎多拉(1)、瑪莎多拉(2)：下班' },
            { time: '19:30', text: '一坪海岸線(1)、一坪海岸線(2)、統治者的祝福(1)、統治者的祝福(2)：下班' }
        ];

        const breakSchedule = [
            { role: '票亭', self: ['11:30', '12:00'], rover: ['15:35', '16:05'] },
            { role: '驗票', self: ['11:30', '12:00'], rover: ['12:00', '12:30'] },
            { role: '入口', self: ['11:34', '12:04'], rover: ['15:05', '15:35'] },
            { role: '安一場控', self: ['12:00', '12:30'], rover: ['12:30', '13:00'] },
            { role: '安二場控', self: ['12:28', '12:58'], rover: ['16:05', '16:35'] },
            { role: '瑪莎多拉(1)', self: ['12:00', '12:30'], rover: ['13:00', '13:30'] },
            { role: '瑪莎多拉(2)', self: ['12:28', '12:58'], rover: ['16:35', '17:05'] },
            { role: '一坪海岸線(1)', self: ['12:55', '13:25'], rover: ['17:05', '17:35'] },
            { role: '一坪海岸線(2)', self: ['12:55', '13:25'], rover: ['17:35', '18:05'] },
            { role: '統治者的祝福(1)', self: ['13:05', '13:35'], rover: ['13:35', '14:05'] },
            { role: '統治者的祝福(2)', self: ['14:05', '15:05'], rover: null, isRover: true }
        ];

        const eventContainer = document.getElementById('eventContainer');
        const btnNow = document.getElementById('btnNow');
        const btnNotify = document.getElementById('btnNotify');
        const restingListEl = document.getElementById('restingList');
        const roverStatusEl = document.getElementById('roverStatus');
        
        // Modal Elements
        const roleSearch = document.getElementById('roleSearch');
        const restModal = document.getElementById('restModal');
        const closeModal = document.getElementById('closeModal');
        const modalRoleName = document.getElementById('modalRoleName');
        const modalBody = document.getElementById('modalBody');

        // --- 網頁內建音效與通知系統 ---
        let notificationEnabled = false;
        let lastNotifiedTime = null;
        let audioCtx = null;

        function initAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch(e) { console.warn("音效初始化失敗", e); }
        }

        function playBeep() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine'; // 乾淨的提示音
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime); // C6音高
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } catch(e) {}
        }

        function showToast(title, body) {
            const toast = document.createElement('div');
            toast.className = 'toast show';
            toast.innerHTML = `<div style="font-size:1.2rem;margin-bottom:6px;">🔔 ${title}</div><div style="font-size:1rem;font-weight:normal;">${body}</div>`;
            document.getElementById('toastContainer').appendChild(toast);
            playBeep();
            
            // 5秒後自動消失
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        btnNotify.addEventListener('click', () => {
            initAudio(); // 點擊時解鎖音效權限

            // 檢查瀏覽器是否支援系統通知
            if (!("Notification" in window)) {
                showToast("⚠️ 系統不支援", "您的瀏覽器不支援推播。如果是 iPhone，請先將網頁『加入主畫面』後再試試。");
                return;
            }

            // 要求權限
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    notificationEnabled = true;
                    updateNotifyBtnState();
                    
                    // 發送一則測試的系統層級通知 (像手遊一樣)
                    try {
                        new Notification("✅ 場控系統通知已啟用", {
                            body: "太棒了！之後的排班提醒會像這樣在手機系統彈出！\n(請確保網頁保持在背景運作)",
                            icon: "https://cdn-icons-png.flaticon.com/512/1827/1827370.png" // 加上鈴鐺小圖示
                        });
                    } catch(e) {
                        showToast("設定成功", "通知權限已開啟，但無法觸發系統橫幅，可能需將此網頁『加入主畫面』。");
                    }

                } else if (permission === "denied") {
                    notificationEnabled = false;
                    updateNotifyBtnState();
                    showToast("❌ 權限被拒絕", "您封鎖了通知權限。請至瀏覽器設定中解鎖，否則只能使用網頁內建的綠色橫幅提醒。");
                }
            });
        });

        function updateNotifyBtnState() {
            if (notificationEnabled) {
                btnNotify.innerHTML = '🔔';
                btnNotify.classList.add('active');
            } else {
                btnNotify.innerHTML = '🔕';
                btnNotify.classList.remove('active');
            }
        }

        function isTimeInRange(t, start, end) {
            if (!t || !start || !end) return false;
            return t >= start && t < end;
        }

        function colorizeRoles(text) {
            let res = text;
            const rovers = ['機動人員', '統治者的祝福\\(2\\)'];
            const fronts = ['票亭', '驗票', '入口'];
            const controls = ['安一場控', '安二場控'];
            const stations = ['瑪莎多拉\\(1\\)', '瑪莎多拉\\(2\\)', '一坪海岸線\\(1\\)', '一坪海岸線\\(2\\)', '統治者的祝福\\(1\\)'];
            const actors = ['A組演員', 'B組演員', '戀愛都市杜里亞斯'];

            const createBadge = (roleName, cssClass) => {
                const displayName = roleStaffMap[roleName] ? `${roleName}(${roleStaffMap[roleName]})` : roleName;
                return `<span class="badge ${cssClass}">${displayName}</span>`;
            };

            rovers.forEach(r => {
                const actualRoleName = r.replace(/\\/g, ''); 
                res = res.replace(new RegExp(r, 'g'), createBadge(actualRoleName, 'badge-rover'));
            });
            fronts.forEach(r => res = res.replace(new RegExp(r, 'g'), createBadge(r, 'badge-front')));
            controls.forEach(r => res = res.replace(new RegExp(r, 'g'), createBadge(r, 'badge-control')));
            stations.forEach(r => {
                const actualRoleName = r.replace(/\\/g, '');
                res = res.replace(new RegExp(r, 'g'), createBadge(actualRoleName, 'badge-station'));
            });
            actors.forEach(r => res = res.replace(new RegExp(r, 'g'), `<span class="badge badge-actor">$&</span>`));
            
            return res;
        }

        // 第一步：產生所有事件的 HTML 架構 (只在初始化時執行一次，避免畫面閃爍)
        function generateAllEventsDOM() {
            eventContainer.innerHTML = '';
            eventsData.forEach((e, index) => {
                const html = `
                    <div class="event-card" id="event-${index}">
                        <div class="time-col">${e.time}</div>
                        <div class="desc-col">
                            <div class="status-badge" id="badge-${index}"></div>
                            <div id="text-${index}">${colorizeRoles(e.text)}</div>
                        </div>
                    </div>`;
                eventContainer.insertAdjacentHTML('beforeend', html);
            });
        }

        // 當 CSV 載入名字後，只更新文字，不重建整個 DOM
        function updateEventsTextOnly() {
            eventsData.forEach((e, index) => {
                const textEl = document.getElementById(`text-${index}`);
                if(textEl) textEl.innerHTML = colorizeRoles(e.text);
            });
        }

        // 第二步：每秒更新卡片顏色、焦點，以及底部狀態
        function updateTimelineState() {
            const now = new Date();
            const currentHours = String(now.getHours()).padStart(2, '0');
            const currentMinutes = String(now.getMinutes()).padStart(2, '0');
            const actualTime = `${currentHours}:${currentMinutes}`;

            // 尋找未來第一個發生的事件索引
            let nextIndex = eventsData.findIndex(e => e.time >= actualTime);
            if (nextIndex === -1) nextIndex = eventsData.length;

            // 更新所有卡片的 CSS class
            eventsData.forEach((_, i) => {
                const card = document.getElementById(`event-${i}`);
                const badge = document.getElementById(`badge-${i}`);
                if (!card || !badge) return;

                // 清除所有舊狀態
                card.className = 'event-card';

                if (i === nextIndex - 1) {
                    card.classList.add('past-immediate');
                    badge.innerHTML = '⚠️ 待確認 (CHECK)';
                } else if (i === nextIndex) {
                    card.classList.add('future-immediate');
                    badge.innerHTML = '即將到來 (NEXT)';
                } else if (i < nextIndex - 1) {
                    card.classList.add('past-normal');
                    badge.innerHTML = '已結束';
                } else if (i > nextIndex) {
                    card.classList.add('future-normal');
                    badge.innerHTML = '稍後';
                }
            });

            // 更新底部狀態列
            updateBottomStatus(actualTime);
            
            // 推播通知邏輯 (三重提醒：系統推播 + 網頁橫幅 + 音效)
            if (notificationEnabled && lastNotifiedTime !== actualTime) {
                const eventNow = eventsData.find(e => e.time === actualTime);
                if (eventNow) {
                    // 把 HTML 標籤過濾掉，變成純文字
                    let plainText = eventNow.text.replace(/<br>/g, '\n').replace(/<[^>]*>?/gm, '');
                    
                    // 1. 系統層級推播 (發送像手遊一樣的系統通知)
                    if (Notification.permission === "granted") {
                        try {
                            new Notification(`【場控時刻】${actualTime}`, { 
                                body: plainText,
                                icon: "https://cdn-icons-png.flaticon.com/512/1827/1827370.png",
                                requireInteraction: true // 盡量讓通知留在畫面上直到用戶點擊
                            });
                        } catch(e) { console.log("系統通知發送失敗", e); }
                    }
                    
                    // 2. 網頁內建橫幅與音效 (螢幕亮著必定觸發)
                    showToast(`時刻提醒：${actualTime}`, plainText.replace(/\n/g, '<br>'));
                    
                    lastNotifiedTime = actualTime;
                }
            }
        }

        function updateBottomStatus(currentTime) {
            let restingHtml = [];
            let roverHtml = `<span class="status-item">在原崗位 (或未上班)</span>`;

            const getDisplayName = (roleName) => {
                return roleStaffMap[roleName] ? `${roleName}(${roleStaffMap[roleName]})` : roleName;
            };

            breakSchedule.forEach(sch => {
                if (isTimeInRange(currentTime, sch.self[0], sch.self[1])) {
                    let type = sch.isRover ? "大休" : "自休";
                    restingHtml.push(`<span class="status-item">${getDisplayName(sch.role)} (${type})</span>`);
                }
                if (sch.rover && isTimeInRange(currentTime, sch.rover[0], sch.rover[1])) {
                    restingHtml.push(`<span class="status-item">${getDisplayName(sch.role)} (輪休)</span>`);
                    roverHtml = `<span class="status-item highlight">接替 ${getDisplayName(sch.role)}</span>`;
                }
            });

            if (isTimeInRange(currentTime, '14:05', '15:05')) {
                roverHtml = `<span class="status-item highlight">大休中</span>`;
            }

            restingListEl.innerHTML = restingHtml.length > 0 ? restingHtml.join('') : '<span class="status-item" style="color:#777">無人休息</span>';
            roverStatusEl.innerHTML = roverHtml;
        }

        // 自動滑動到當下焦點事件
        function scrollToFocus() {
            // 優先找「即將到來」，找不到再找「待確認」
            let targetCard = document.querySelector('.future-immediate') || document.querySelector('.past-immediate');
            if (targetCard) {
                // 將元素滾動到畫面的中間偏上
                const y = targetCard.getBoundingClientRect().top + window.scrollY - 100;
                window.scrollTo({ top: y, behavior: 'smooth' });
            }
        }

        btnNow.addEventListener('click', scrollToFocus);

        // 處理崗位查詢 (Modal)
        roleSearch.addEventListener('change', function() {
            const selectedRole = this.value;
            if(!selectedRole) return;
            
            const sch = breakSchedule.find(s => s.role === selectedRole);
            const displayName = roleStaffMap[selectedRole] ? `${selectedRole} (${roleStaffMap[selectedRole]})` : selectedRole;
            
            modalRoleName.innerText = displayName;
            let html = '';
            
            if(sch) {
                if(sch.isRover) {
                    html += `
                    <div class="rest-block">
                        <div class="rest-label">大休時間</div>
                        <div class="rest-time" style="color:#bb86fc">${sch.self[0]} - ${sch.self[1]}</div>
                    </div>`;
                } else {
                    html += `
                    <div class="rest-block">
                        <div class="rest-label">自休時間 (不離崗)</div>
                        <div class="rest-time">${sch.self[0]} - ${sch.self[1]}</div>
                    </div>`;
                    if(sch.rover) {
                        html += `
                        <div class="rest-block">
                            <div class="rest-label">機動輪休時間 (可離崗)</div>
                            <div class="rest-time" style="color:#03dac6">${sch.rover[0]} - ${sch.rover[1]}</div>
                        </div>`;
                    }
                }
            } else {
                html = '<p style="color:#aaa">此崗位無特定休息時間設定</p>';
            }
            
            modalBody.innerHTML = html;
            restModal.classList.add('show');
            
            // 查詢後把選單歸位，方便下次選同一個
            this.value = "";
        });

        // 關閉 Modal
        closeModal.addEventListener('click', () => restModal.classList.remove('show'));
        window.addEventListener('click', (e) => {
            if (e.target === restModal) restModal.classList.remove('show');
        });

        function initApp() {
            // 1. 先畫出所有卡片 (防呆，確保沒網路也有畫面)
            generateAllEventsDOM();
            updateTimelineState();
            
            // 延遲一下執行捲動，確保 DOM 已畫完
            setTimeout(scrollToFocus, 300);

            // 啟動背景時鐘 (每秒更新狀態，不會重畫整個 DOM，不會干擾滑動)
            setInterval(updateTimelineState, 1000);

            // 2. 嘗試抓取 Google Sheets 名單
            fetch(GOOGLE_SHEET_CSV_URL)
                .then(res => res.ok ? res.text() : Promise.reject('HTTP ' + res.status))
                .then(csvText => {
                    const targetRoles = [
                        '票亭', '驗票', '入口', '安一場控', '安二場控',
                        '瑪莎多拉1', '瑪莎多拉2', '一坪海岸線1', '一坪海岸線2',
                        '統治者的祝福1', '統治者的祝福2'
                    ];
                    
                    csvText.split('\n').forEach(line => {
                        targetRoles.forEach(role => {
                            if (line.trim().startsWith(role)) {
                                // 乾淨切字刀：拿掉職稱，切掉 @ 後面的東西，只留中文本名
                                let names = line.replace(role, '').split('@')[0].trim();
                                
                                let mapKey = role;
                                if(role === '瑪莎多拉1') mapKey = '瑪莎多拉(1)';
                                if(role === '瑪莎多拉2') mapKey = '瑪莎多拉(2)';
                                if(role === '一坪海岸線1') mapKey = '一坪海岸線(1)';
                                if(role === '一坪海岸線2') mapKey = '一坪海岸線(2)';
                                if(role === '統治者的祝福1') mapKey = '統治者的祝福(1)';
                                if(role === '統治者的祝福2') {
                                    mapKey = '統治者的祝福(2)';
                                    // 賦予機動人員名字
                                    if (names) roleStaffMap['機動人員'] = names;
                                }

                                if (names) roleStaffMap[mapKey] = names;
                            }
                        });
                    });
                    
                    // 抓取完成後，只更新文字與狀態
                    updateEventsTextOnly();
                    updateTimelineState();
                })
                .catch(err => {
                    console.warn("名單讀取失敗，維持無人名模式", err);
                });
        }

        // 確保在 DOM 完全載入後執行
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
