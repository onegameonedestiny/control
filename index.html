<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 加入主畫面的 App 設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>動態場控儀表板</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent: #bb86fc;
            --past-opacity: 1; /* 保持亮度 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 預留底部空間給狀態列 */
            padding-bottom: 80px; 
            min-height: 100vh;
        }

        /* --- 頂部固定控制列 --- */
        header {
            position: sticky;
            top: 0;
            width: 100%;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            padding: 10px 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        h1 {
            color: var(--accent);
            margin: 0;
            font-size: 1.2rem;
            white-space: nowrap;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notify-btn {
            background: transparent;
            border: 1px solid #444;
            color: var(--text-main);
            font-size: 1.2rem;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .notify-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            text-shadow: 0 0 8px rgba(187, 134, 252, 0.5);
        }

        .controls {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        input[type="time"] {
            background-color: #2c2c2c;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 8px;
            font-size: 1.1rem;
            color-scheme: dark;
            font-weight: bold;
        }

        #btnNow {
            background-color: #333;
            color: #aaa;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        /* 自動同步狀態下的 [現] 按鈕 */
        #btnNow.sync-active {
            background-color: var(--accent);
            color: #000;
            box-shadow: 0 0 8px rgba(187, 134, 252, 0.5);
        }

        /* --- 儀表板主要內容 --- */
        .dashboard {
            width: 100%;
            max-width: 600px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-grow: 1;
            justify-content: center; /* 垂直置中 */
        }

        .event-card {
            background-color: var(--panel-bg);
            border-radius: 16px;
            padding: 25px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-left: 8px solid transparent;
        }

        .time-col {
            font-size: 2.2rem;
            font-weight: bold;
            width: 110px;
            flex-shrink: 0;
            text-align: left;
        }

        .desc-col {
            flex-grow: 1;
            font-size: 1.2rem;
            line-height: 1.7;
        }

        .status-badge {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: inline-block;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* 過去事件 (待確認) 樣式 */
        .event-card.past {
            border-left-color: #ffb74d; /* 橘黃色 */
        }
        .past .time-col { color: #ffb74d; }
        .past .status-badge { 
            background-color: rgba(255, 183, 77, 0.2); 
            color: #ffb74d; 
            border: 1px solid rgba(255, 183, 77, 0.5);
        }

        /* 未來事件 (即將到來) 樣式 */
        .event-card.future {
            border-left-color: #03dac6;
        }
        .future .time-col { color: #03dac6; }
        .future .status-badge { 
            background-color: rgba(3, 218, 198, 0.2); 
            color: #03dac6; 
        }
        
        .divider {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 5px 0;
            display: flex;
            align-items: center;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px dashed #444;
            margin: 0 15px;
        }

        /* --- 職位標籤顏色 --- */
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            margin: 2px 2px;
            color: #000;
        }
        .badge-rover { background-color: #cf6679; color: white; }
        .badge-front { background-color: #82b1ff; }
        .badge-control { background-color: #ffb74d; }
        .badge-station { background-color: #69f0ae; }
        .badge-actor { background-color: #e1bee7; } /* 演員專屬顏色 */

        /* --- 底部狀態列 --- */
        .bottom-status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid #333;
            padding: 10px 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            font-size: 0.95rem;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
        }

        .status-row {
            display: flex;
            align-items: flex-start;
        }

        .status-label {
            font-weight: bold;
            color: var(--text-muted);
            width: 70px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .status-content {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .status-item {
            background: #333;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #ddd;
        }
        
        .status-item.highlight {
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        /* 隱藏原生推播UI */
        .notification-bar { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>場控儀表板</h1>
        <div class="header-controls">
            <button id="btnNotify" class="notify-btn" title="開啟推播通知">🔕</button>
            <div class="controls">
                <input type="time" id="timeSimulator" value="12:00" min="10:30" max="19:30">
                <button id="btnNow" class="sync-active">現</button>
            </div>
        </div>
    </header>

    <div class="dashboard" id="eventContainer">
        <!-- 內容由 JavaScript 動態生成 -->
    </div>

    <!-- 底部固定狀態列 -->
    <div class="bottom-status-bar" id="bottomStatusBar">
        <div class="status-row">
            <div class="status-label">🛌 休息中</div>
            <div class="status-content" id="restingList">
                <span class="status-item">計算中...</span>
            </div>
        </div>
        <div class="status-row">
            <div class="status-label">🏃 機動</div>
            <div class="status-content" id="roverStatus">
                <span class="status-item">計算中...</span>
            </div>
        </div>
    </div>

    <script>
        // !!! 請將下方網址替換為您的 Google Sheets "發布為 CSV" 的連結 !!!
        // 取得方式：檔案 -> 共用 -> 發布到網路 -> 選擇工作表 -> 選擇 CSV -> 發布
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCEzSFH4YvcE0I5WUlkSr7Hfn5-tVre5p5-GKWlblVYIIQkpHSFX6vc0Lc_jisVfGfnInry6-l789V/pub?output=csv';

        // 儲存解析後的人員名單對應表
        let roleStaffMap = {};

        // 完整的作息表資料
        const eventsData = [
            { time: '10:30', text: '票亭、驗票、入口：上班' },
            { time: '11:00', text: '安一場控、安二場控、瑪莎多拉(1)、瑪莎多拉(2)：上班' },
            { time: '11:20', text: '確認 A組演員 就位' },
            { time: '11:30', text: '一坪海岸線(1)、一坪海岸線(2)、統治者的祝福(1)、統治者的祝福(2)：上班<br>票亭、驗票：開始自休' },
            { time: '11:34', text: '入口：開始自休' },
            { time: '11:50', text: '確認 戀愛都市杜里亞斯 就位' },
            { time: '12:00', text: '票亭、驗票：自休結束返回<br>安一場控、瑪莎多拉(1)：開始自休<br>機動人員：前往接替驗票輪休' },
            { time: '12:04', text: '入口：自休結束返回' },
            { time: '12:20', text: '確認 B組演員 就位' },
            { time: '12:28', text: '安二場控、瑪莎多拉(2)：開始自休' },
            { time: '12:30', text: '安一場控、瑪莎多拉(1)：自休結束返回<br>驗票：輪休結束返回<br>機動人員：前往接替安一場控輪休' },
            { time: '12:55', text: '一坪海岸線(1)、一坪海岸線(2)：開始自休' },
            { time: '12:58', text: '安二場控、瑪莎多拉(2)：自休結束返回' },
            { time: '13:00', text: '安一場控：輪休結束返回<br>機動人員：前往接替瑪莎多拉(1)輪休' },
            { time: '13:05', text: '統治者的祝福(1)：開始自休' },
            { time: '13:25', text: '一坪海岸線(1)、一坪海岸線(2)：自休結束返回' },
            { time: '13:30', text: '瑪莎多拉(1)：輪休結束返回' },
            { time: '13:35', text: '統治者的祝福(1)：自休結束返回<br>機動人員：前往接替統治者的祝福(1)輪休' },
            { time: '14:05', text: '統治者的祝福(1)：輪休結束返回<br>統治者的祝福(2)：進入大休' },
            { time: '15:05', text: '統治者的祝福(2)：大休結束<br>機動人員：前往接替入口輪休' },
            { time: '15:35', text: '入口：輪休結束返回<br>機動人員：前往接替票亭輪休' },
            { time: '16:05', text: '票亭：輪休結束返回<br>機動人員：前往接替安二場控輪休' },
            { time: '16:35', text: '安二場控：輪休結束返回<br>機動人員：前往接替瑪莎多拉(2)輪休' },
            { time: '17:05', text: '瑪莎多拉(2)：輪休結束返回<br>機動人員：前往接替一坪海岸線(1)輪休' },
            { time: '17:35', text: '一坪海岸線(1)：輪休結束返回<br>機動人員：前往接替一坪海岸線(2)輪休' },
            { time: '18:05', text: '一坪海岸線(2)：輪休結束返回' },
            { time: '18:30', text: '票亭、驗票、入口：下班' },
            { time: '19:00', text: '安一場控、安二場控、瑪莎多拉(1)、瑪莎多拉(2)：下班' },
            { time: '19:30', text: '一坪海岸線(1)、一坪海岸線(2)、統治者的祝福(1)、統治者的祝福(2)：下班' }
        ];

        // 各崗位休息時段資料 (用於計算底部狀態列)
        const breakSchedule = [
            { role: '票亭', self: ['11:30', '12:00'], rover: ['15:35', '16:05'] },
            { role: '驗票', self: ['11:30', '12:00'], rover: ['12:00', '12:30'] },
            { role: '入口', self: ['11:34', '12:04'], rover: ['15:05', '15:35'] },
            { role: '安一場控', self: ['12:00', '12:30'], rover: ['12:30', '13:00'] },
            { role: '安二場控', self: ['12:28', '12:58'], rover: ['16:05', '16:35'] },
            { role: '瑪莎多拉(1)', self: ['12:00', '12:30'], rover: ['13:00', '13:30'] },
            { role: '瑪莎多拉(2)', self: ['12:28', '12:58'], rover: ['16:35', '17:05'] },
            { role: '一坪海岸線(1)', self: ['12:55', '13:25'], rover: ['17:05', '17:35'] },
            { role: '一坪海岸線(2)', self: ['12:55', '13:25'], rover: ['17:35', '18:05'] },
            { role: '統治者的祝福(1)', self: ['13:05', '13:35'], rover: ['13:35', '14:05'] },
            { role: '統治者的祝福(2)', self: ['14:05', '15:05'], rover: null, isRover: true } // 大休
        ];

        const timeInput = document.getElementById('timeSimulator');
        const eventContainer = document.getElementById('eventContainer');
        const btnNow = document.getElementById('btnNow');
        const btnNotify = document.getElementById('btnNotify');
        const restingListEl = document.getElementById('restingList');
        const roverStatusEl = document.getElementById('roverStatus');

        let notificationEnabled = false;
        let lastNotifiedTime = null;
        let isAutoSync = true; // 預設開啟自動同步

        // --- 通知功能設定 ---
        if ("Notification" in window) {
            btnNotify.addEventListener('click', () => {
                if (Notification.permission === "granted") {
                    notificationEnabled = !notificationEnabled;
                    updateNotifyBtnState();
                } else if (Notification.permission !== "denied") {
                    Notification.requestPermission().then(permission => {
                        if (permission === "granted") {
                            notificationEnabled = true;
                            updateNotifyBtnState();
                        }
                    });
                } else {
                    alert("您已在瀏覽器封鎖通知，請至設定開啟。");
                }
            });
        } else {
            btnNotify.style.display = 'none';
        }

        function updateNotifyBtnState() {
            if (notificationEnabled) {
                btnNotify.innerHTML = '🔔';
                btnNotify.classList.add('active');
            } else {
                btnNotify.innerHTML = '🔕';
                btnNotify.classList.remove('active');
            }
        }

        // 幫文字上標籤顏色的函式
        function colorizeRoles(text) {
            let res = text;
            const rovers = ['機動人員', '統治者的祝福\\(2\\)'];
            const fronts = ['票亭', '驗票', '入口'];
            const controls = ['安一場控', '安二場控'];
            const stations = ['瑪莎多拉\\(1\\)', '瑪莎多拉\\(2\\)', '一坪海岸線\\(1\\)', '一坪海岸線\\(2\\)', '統治者的祝福\\(1\\)'];
            const actors = ['A組演員', 'B組演員', '戀愛都市杜里亞斯'];

            rovers.forEach(r => res = res.replace(new RegExp(r, 'g'), `<span class="badge badge-rover">$&</span>`));
            fronts.forEach(r => res = res.replace(new RegExp(r, 'g'), `<span class="badge badge-front">$&</span>`));
            controls.forEach(r => res = res.replace(new RegExp(r, 'g'), `<span class="badge badge-control">$&</span>`));
            stations.forEach(r => res = res.replace(new RegExp(r, 'g'), `<span class="badge badge-station">$&</span>`));
            actors.forEach(r => res = res.replace(new RegExp(r, 'g'), `<span class="badge badge-actor">$&</span>`));
            
            return res;
        }

        // 判斷某個時間 `t` 是否落在 `start` 和 `end` 之間 (左閉右開)
        function isTimeInRange(t, start, end) {
            if (!start || !end) return false;
            return t >= start && t < end;
        }

        // 更新底部狀態列
        function updateBottomStatus(currentTime) {
            let restingHtml = [];
            let roverHtml = `<span class="status-item">在原崗位 (或未上班)</span>`;

            // 輔助函式：取得帶人名的職位名稱
            const getDisplayName = (roleName) => {
                return roleStaffMap[roleName] ? `${roleName}(${roleStaffMap[roleName]})` : roleName;
            };

            breakSchedule.forEach(sch => {
                // 檢查自休/大休
                if (isTimeInRange(currentTime, sch.self[0], sch.self[1])) {
                    let type = sch.isRover ? "大休" : "自休";
                    restingHtml.push(`<span class="status-item">${getDisplayName(sch.role)} (${type})</span>`);
                }
                
                // 檢查輪休
                if (sch.rover && isTimeInRange(currentTime, sch.rover[0], sch.rover[1])) {
                    restingHtml.push(`<span class="status-item">${getDisplayName(sch.role)} (輪休)</span>`);
                    roverHtml = `<span class="status-item highlight">接替 ${getDisplayName(sch.role)}</span>`;
                }
            });

            if (isTimeInRange(currentTime, '14:05', '15:05')) {
                roverHtml = `<span class="status-item highlight">大休中</span>`;
            }

            restingListEl.innerHTML = restingHtml.length > 0 ? restingHtml.join('') : '<span class="status-item" style="color:#777">無人休息</span>';
            roverStatusEl.innerHTML = roverHtml;
        }

        // 渲染儀表板的函式
        function renderDashboard() {
            const currentTime = timeInput.value;
            eventContainer.innerHTML = '';

            // 尋找未來第一個發生的事件索引
            let nextIndex = eventsData.findIndex(e => e.time >= currentTime);
            if (nextIndex === -1) nextIndex = eventsData.length;

            // 抓取過去剛發生的一件、未來即將發生的一件
            const pastEvent = nextIndex > 0 ? eventsData[nextIndex - 1] : null;
            const futureEvent = nextIndex < eventsData.length ? eventsData[nextIndex] : null;

            // 渲染剛發生的事件 (橘色待確認)
            if (pastEvent) {
                const html = `
                    <div class="event-card past">
                        <div class="time-col">${pastEvent.time}</div>
                        <div class="desc-col">
                            <div class="status-badge">⚠️ 待確認 (CHECK)</div>
                            <div>${colorizeRoles(pastEvent.text)}</div>
                        </div>
                    </div>`;
                eventContainer.insertAdjacentHTML('beforeend', html);
            }

            eventContainer.insertAdjacentHTML('beforeend', `<div class="divider">當前時間 ${currentTime}</div>`);

            // 渲染即將到來的事件 (綠色)
            if (futureEvent) {
                const html = `
                    <div class="event-card future">
                        <div class="time-col">${futureEvent.time}</div>
                        <div class="desc-col">
                            <div class="status-badge">即將到來 (NEXT)</div>
                            <div>${colorizeRoles(futureEvent.text)}</div>
                        </div>
                    </div>`;
                eventContainer.insertAdjacentHTML('beforeend', html);
            }
            
            if (!pastEvent && !futureEvent) {
                 eventContainer.innerHTML = '<p style="text-align:center; color:#888;">查無行程資料</p>';
            }

            // 同步更新底部狀態列
            updateBottomStatus(currentTime);
        }

        // --- 自動同步與推播核心邏輯 ---
        setInterval(() => {
            const now = new Date();
            const actualTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            // 1. 自動同步時間
            if (isAutoSync && timeInput.value !== actualTime) {
                timeInput.value = actualTime;
                renderDashboard();
            }

            // 2. 推播通知
            if (!notificationEnabled) return;
            if (timeInput.value !== actualTime) return; // 沒同步時不推播
            if (lastNotifiedTime === actualTime) return; // 這分鐘推過了

            const eventNow = eventsData.find(e => e.time === actualTime);
            if (eventNow) {
                let plainText = eventNow.text.replace(/<br>/g, '\n').replace(/<[^>]*>?/gm, '');
                
                if (Notification.permission === "granted") {
                    new Notification(`【場控提醒】${actualTime}`, {
                        body: plainText,
                        icon: "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏰</text></svg>"
                    });
                    lastNotifiedTime = actualTime;
                }
            }
        }, 1000); // 每秒檢查

        // --- 綁定事件 ---
        timeInput.addEventListener('input', () => {
            isAutoSync = false;
            btnNow.classList.remove('sync-active');
            renderDashboard();
        });
        
        btnNow.addEventListener('click', () => {
            isAutoSync = true;
            btnNow.classList.add('sync-active');
            
            const now = new Date();
            timeInput.value = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            renderDashboard();
        });

        // --- 初始載入設定 ---
        window.onload = () => {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            timeInput.value = `${hours}:${minutes}`;
            
            // 第一階段：立刻先用預設的職位名稱渲染儀表板，確保不會畫面空白
            renderDashboard();
            
            // 第二階段：在背景嘗試載入名單，載入完成後再重新渲染一次加上人名
            loadStaffList().then(() => {
                // 成功抓取後，重新渲染畫面 (此時已有名字)
                renderDashboard();
            }).catch(err => {
                // 就算發生網路錯誤、404、或是 CORS 被擋，儀表板依然已經在第一階段顯示了
                console.error("載入人員名單失敗，維持使用預設職位名稱", err);
            });
        };

        // 載入 Google Sheets CSV 資料
        async function loadStaffList() {
            if (!GOOGLE_SHEET_CSV_URL || GOOGLE_SHEET_CSV_URL.includes('您的發布ID')) {
                console.warn("尚未設定有效的 Google Sheet CSV 網址");
                return;
            }

            try {
                // 加入 credentials: 'omit' 與 cache: 'no-store' 降低在 Github Pages 上遇到的 CORS/Cache 問題機率
                const response = await fetch(GOOGLE_SHEET_CSV_URL, { 
                    method: 'GET',
                    cache: 'no-store',
                    credentials: 'omit' 
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const csvText = await response.text();
                
                parseStaffText(csvText);
            } catch (error) {
                // 將錯誤往上層丟，由上面的 .catch 去處理
                throw error;
            }
        }

        // 解析 A1 格式的純文字，提取職位與人名
        function parseStaffText(text) {
            // 定義我們要尋找的關鍵職位
            const targetRoles = [
                '票亭', '驗票', '入口', '安一場控', '安二場控',
                '瑪莎多拉1', '瑪莎多拉2', '一坪海岸線1', '一坪海岸線2',
                '統治者的祝福1', '統治者的祝福2', '補貨/機動'
            ];

            // 逐行解析
            const lines = text.split('\n');
            lines.forEach(line => {
                targetRoles.forEach(role => {
                    // 檢查這行是否以該職位開頭 (處理可能有的空格)
                    if (line.trim().startsWith(role)) {
                        // 移除職位名稱，剩下的就是人名與標籤
                        let names = line.replace(role, '').trim();
                        // 移除 @標籤 (如果不需要顯示 LINE ID，可以保留這行)
                        names = names.replace(/@\S+/g, '').trim();
                        
                        // 存入對應表，處理一些名稱對齊問題
                        let mapKey = role;
                        if(role === '瑪莎多拉1') mapKey = '瑪莎多拉(1)';
                        if(role === '瑪莎多拉2') mapKey = '瑪莎多拉(2)';
                        if(role === '一坪海岸線1') mapKey = '一坪海岸線(1)';
                        if(role === '一坪海岸線2') mapKey = '一坪海岸線(2)';
                        if(role === '統治者的祝福1') mapKey = '統治者的祝福(1)';
                        if(role === '統治者的祝福2') mapKey = '統治者的祝福(2)';
                        if(role === '補貨/機動') mapKey = '機動人員';

                        if (names) {
                            roleStaffMap[mapKey] = names;
                        }
                    }
                });
            });
            console.log("解析出的人員名單:", roleStaffMap);
        }

        // 幫文字上標籤顏色的函式 (修改：加入人名)
        function colorizeRoles(text) {
            let res = text;
            const rovers = ['機動人員', '統治者的祝福\\(2\\)'];
            const fronts = ['票亭', '驗票', '入口'];
            const controls = ['安一場控', '安二場控'];
            const stations = ['瑪莎多拉\\(1\\)', '瑪莎多拉\\(2\\)', '一坪海岸線\\(1\\)', '一坪海岸線\\(2\\)', '統治者的祝福\\(1\\)'];
            const actors = ['A組演員', 'B組演員', '戀愛都市杜里亞斯'];

            // 輔助函式：產生帶有人名的標籤 HTML
            const createBadge = (roleName, cssClass) => {
                const displayName = roleStaffMap[roleName] ? `${roleName}(${roleStaffMap[roleName]})` : roleName;
                return `<span class="badge ${cssClass}">${displayName}</span>`;
            };

            rovers.forEach(r => {
                const actualRoleName = r.replace(/\\/g, ''); // 移除 regex 用的斜線
                res = res.replace(new RegExp(r, 'g'), createBadge(actualRoleName, 'badge-rover'));
            });
            fronts.forEach(r => res = res.replace(new RegExp(r, 'g'), createBadge(r, 'badge-front')));
            controls.forEach(r => res = res.replace(new RegExp(r, 'g'), createBadge(r, 'badge-control')));
            stations.forEach(r => {
                const actualRoleName = r.replace(/\\/g, '');
                res = res.replace(new RegExp(r, 'g'), createBadge(actualRoleName, 'badge-station'));
            });
            actors.forEach(r => res = res.replace(new RegExp(r, 'g'), `<span class="badge badge-actor">$&</span>`));
            
            return res;
        }
